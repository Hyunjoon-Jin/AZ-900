<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AZ-900 학습 앱</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="테마 전환" title="테마 전환">
    <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>
    <svg class="icon icon-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/></svg>
  </button>
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M13.4 2 5.6 15.8h5L9 22l9.4-13.8h-5.2L16.6 2z" fill="currentColor"/>
    </svg>
    <div>
      <h1>AZ-900 학습 도우미</h1>
      <p class="subtitle">Microsoft Azure Fundamentals · 10일 집중 코스</p>
    </div>
  </div>
</header>

<nav class="tabs" role="tablist">
  <button class="tab-btn active" data-tab="flashcards" role="tab" aria-selected="true">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="14" height="10" rx="2"/><path d="M7 4h14a0 0 0 0 1 0 0v10a2 2 0 0 1-2 2H9"/></svg>
    <span>플래시카드</span>
  </button>
  <button class="tab-btn" data-tab="quiz" role="tab" aria-selected="false">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 12.5l2 2 4-4.5"/></svg>
    <span>퀴즈</span>
  </button>
  <button class="tab-btn" data-tab="progress" role="tab" aria-selected="false">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
    <span>진행 상황</span>
  </button>
</nav>

<main>
  <!-- 플래시카드 -->
  <section id="tab-flashcards" class="tab-panel active">
    <div class="controls">
      <label for="fc-topic">주제</label>
      <select id="fc-topic"></select>
      <button id="fc-shuffle" class="btn-ghost" type="button">
        <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3l4 4-4 4M7 21l-4-4 4-4M3 7h5.5a4 4 0 0 1 3.3 1.8L15 12M21 17h-5.5a4 4 0 0 1-3.3-1.8L9 12"/></svg>
        섞기
      </button>
      <label class="checkbox-inline">
        <input type="checkbox" id="fc-hide-mastered">
        외운 카드 숨기기
      </label>
    </div>

    <div class="meter-row">
      <div class="meter" role="progressbar" aria-label="암기 진행률">
        <div class="meter-fill" id="fc-meter-fill"></div>
      </div>
      <span class="meter-label" id="fc-meter-label"></span>
    </div>

    <div class="fc-progress" id="fc-progress"></div>

    <div class="fc-stage">
      <button id="fc-prev" class="fc-arrow fc-arrow-left" type="button" aria-label="이전 카드">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>

      <div id="fc-card" class="flashcard">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <span class="fc-tag" id="fc-tag"></span>
            <p class="fc-text"></p>
            <span class="fc-hint">클릭하거나 Space를 눌러 뒤집기</span>
          </div>
          <div class="flashcard-back">
            <p class="fc-text"></p>
          </div>
        </div>
      </div>

      <button id="fc-next" class="fc-arrow fc-arrow-right" type="button" aria-label="다음 카드">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </div>

    <div id="fc-empty" class="empty-state hidden">
      <p>🎉 이 주제의 모든 카드를 외웠어요!</p>
      <button id="fc-empty-reset" class="btn-primary" type="button">전체 카드 다시 보기</button>
    </div>

    <div class="fc-actions">
      <button id="fc-again" class="btn-outline btn-danger-outline" type="button">🔁 다시 볼게요</button>
      <button id="fc-flip" class="btn-ghost" type="button">뒤집기</button>
      <button id="fc-know" class="btn-outline btn-good-outline" type="button">✅ 알아요</button>
    </div>
    <p class="kbd-hint">키보드: ← → 이동 · Space/Enter 뒤집기</p>
  </section>

  <!-- 퀴즈 -->
  <section id="tab-quiz" class="tab-panel">
    <div id="quiz-setup" class="controls">
      <label for="quiz-topic">주제</label>
      <select id="quiz-topic">
        <option value="all">전체(모의고사)</option>
      </select>
      <label for="quiz-count">문항 수</label>
      <select id="quiz-count">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="999">전체</option>
      </select>
      <button id="quiz-start" class="btn-primary" type="button">퀴즈 시작</button>
    </div>

    <div id="quiz-play" class="hidden">
      <div class="meter-row">
        <div class="meter" role="progressbar" aria-label="퀴즈 진행률">
          <div class="meter-fill" id="quiz-meter-fill"></div>
        </div>
        <span class="meter-label" id="quiz-meter-label"></span>
      </div>
      <div class="quiz-meta">
        <span id="quiz-progress"></span>
        <span id="quiz-score" class="score-pill"></span>
      </div>
      <div id="quiz-question" class="quiz-question"></div>
      <div id="quiz-options" class="quiz-options"></div>
      <div id="quiz-explain" class="quiz-explain hidden"></div>
      <div class="quiz-nav">
        <button id="quiz-next" class="btn-primary hidden" type="button">다음 문제 →</button>
      </div>
      <p class="kbd-hint">키보드: 1~4 선택 · Enter 다음 문제</p>
    </div>

    <div id="quiz-result" class="hidden">
      <div class="result-hero">
        <div class="donut" id="quiz-donut">
          <span class="donut-value" id="quiz-donut-value"></span>
        </div>
        <div class="result-hero-text">
          <p id="quiz-result-summary" class="result-summary"></p>
          <p id="quiz-result-caption" class="result-caption"></p>
        </div>
      </div>

      <h3 class="section-title">주제별 정답률</h3>
      <div id="quiz-topic-breakdown" class="topic-breakdown"></div>

      <h3 class="section-title">오답 노트</h3>
      <div id="quiz-review"></div>

      <div class="result-actions">
        <button id="quiz-retry-wrong" class="btn-outline btn-danger-outline hidden" type="button"></button>
        <button id="quiz-restart" class="btn-primary" type="button">다시 풀기</button>
      </div>
    </div>
  </section>

  <!-- 진행 상황 -->
  <section id="tab-progress" class="tab-panel">
    <p class="hint">체크리스트는 브라우저(localStorage)에 저장됩니다. 다른 기기/브라우저와는 공유되지 않습니다.</p>

    <div class="result-hero progress-hero">
      <div class="donut" id="progress-donut">
        <span class="donut-value" id="progress-donut-value"></span>
      </div>
      <div class="result-hero-text">
        <p class="result-summary" id="progress-summary"></p>
        <p class="result-caption">10일 계획 전체 진행률</p>
      </div>
    </div>

    <div class="day-overview" id="day-overview"></div>
    <div id="progress-days"></div>
  </section>
</main>

<footer class="app-footer">
  <p>AZ-900 스터디 프로그램 · <a href="../study-plan.md">학습 계획 문서 보기</a></p>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
